<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a1a1aa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="gradEVM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#09090b" rx="0"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">Float Architecture</text>
  <text x="600" y="58" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="12">Consumer DeFi on Flow — Deposit, Earn, Battle</text>

  <!-- ==================== SECTION: FRONTEND ==================== -->
  <rect x="180" y="72" width="640" height="120" rx="12" fill="url(#gradGreen)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="196" y="92" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5" text-transform="uppercase">FRONTEND</text>

  <!-- User -->
  <rect x="210" y="104" width="160" height="68" rx="10" fill="#18181b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="133" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">User</text>
  <text x="290" y="153" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Passkey / Wallet</text>

  <!-- React Frontend -->
  <rect x="430" y="104" width="360" height="68" rx="10" fill="#18181b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="133" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">React Frontend</text>
  <text x="610" y="153" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Vite + Tailwind + FCL + viem</text>

  <!-- Arrow: User -> Frontend -->
  <line x1="370" y1="138" x2="425" y2="138" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ==================== SECTION: CADENCE LAYER ==================== -->
  <rect x="420" y="220" width="380" height="180" rx="12" fill="url(#gradBlue)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="436" y="240" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">CADENCE LAYER</text>

  <!-- Cadence Transaction -->
  <rect x="450" y="254" width="200" height="52" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="278" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Cadence Transaction</text>
  <text x="550" y="295" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">FCL.mutate()</text>

  <!-- COA -->
  <rect x="450" y="326" width="200" height="52" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="349" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">COA</text>
  <text x="550" y="366" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">Cadence Owned Account</text>

  <!-- Arrow: Cadence Tx -> COA -->
  <line x1="550" y1="306" x2="550" y2="321" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ==================== Read path arrow (viem) ==================== -->
  <!-- Frontend -> EVM directly (reads) -->
  <rect x="210" y="220" width="160" height="180" rx="12" fill="url(#gradGreen)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.2" filter="url(#shadow)"/>
  <text x="226" y="240" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">READS</text>

  <rect x="230" y="258" width="120" height="52" rx="8" fill="#18181b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="281" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Flow EVM</text>
  <text x="290" y="298" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="10">viem (read)</text>

  <!-- Arrow: Frontend -> reads box -->
  <line x1="500" y1="172" x2="500" y2="200" stroke="#22c55e" stroke-width="0" />
  <path d="M 480 172 L 480 200 L 290 200 L 290 253" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="385" y="197" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="10" font-weight="500">reads (viem)</text>

  <!-- Arrow: Frontend -> Cadence Tx (writes) -->
  <path d="M 610 172 L 610 200 L 550 200 L 550 249" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="620" y="214" text-anchor="start" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="10" font-weight="500">writes (FCL)</text>

  <!-- Arrow: reads box -> EVM contracts -->
  <line x1="290" y1="310" x2="290" y2="430" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Arrow: COA -> EVM contracts -->
  <path d="M 550 378 L 550 410 L 480 410 L 480 430" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="556" y="405" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">coa.call()</text>

  <!-- ==================== SECTION: EVM LAYER ==================== -->
  <rect x="180" y="430" width="640" height="220" rx="12" fill="url(#gradEVM)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="196" y="452" fill="#a855f7" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">FLOW EVM CONTRACTS</text>

  <!-- FloatVault -->
  <rect x="210" y="466" width="270" height="160" rx="10" fill="#18181b" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="345" y="490" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">FloatVault.sol</text>
  <line x1="230" y1="500" x2="460" y2="500" stroke="#27272a" stroke-width="1"/>
  <text x="235" y="520" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">deposit(amount)</text>
  <text x="235" y="540" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">withdraw(amount)</text>
  <text x="235" y="560" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">yieldOf(user)</text>
  <text x="235" y="580" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">lockYield(amount)</text>
  <text x="235" y="602" fill="#86efac" font-family="monospace, sans-serif" font-size="11">→ Yield Generation (Aave V3)</text>

  <!-- BattlePool -->
  <rect x="520" y="466" width="270" height="160" rx="10" fill="#18181b" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="490" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">BattlePool.sol</text>
  <line x1="540" y1="500" x2="770" y2="500" stroke="#27272a" stroke-width="1"/>
  <text x="545" y="520" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">createBattle(params)</text>
  <text x="545" y="540" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">enter(battleId)</text>
  <text x="545" y="560" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">resolve(battleId)</text>
  <text x="545" y="580" fill="#d4d4d8" font-family="monospace, sans-serif" font-size="12">claim(battleId)</text>
  <text x="545" y="602" fill="#fbbf24" font-family="monospace, sans-serif" font-size="11">→ Band Oracle (price data)</text>

  <!-- Connection line between vaults -->
  <line x1="480" y1="546" x2="520" y2="546" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>

  <!-- ==================== SECTION: YIELD ==================== -->
  <rect x="210" y="670" width="270" height="52" rx="10" fill="#18181b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="345" y="694" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">MORE Markets (Aave V3)</text>
  <text x="345" y="710" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="10">Yield Generation</text>

  <!-- Arrow: FloatVault -> Aave -->
  <line x1="345" y1="626" x2="345" y2="665" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ==================== SECTION: SIDE PANEL — Scheduled Handlers ==================== -->
  <rect x="870" y="220" width="290" height="270" rx="12" fill="url(#gradBlue)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="886" y="242" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">CADENCE SCHEDULED HANDLERS</text>

  <!-- YieldCompounder -->
  <rect x="896" y="258" width="240" height="52" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1016" y="281" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">YieldCompounder</text>
  <text x="1016" y="298" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">Auto-compound yield positions</text>

  <!-- BattleResolver -->
  <rect x="896" y="326" width="240" height="52" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1016" y="349" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BattleResolver</text>
  <text x="1016" y="366" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">Settle expired battles</text>

  <!-- BattleCreator -->
  <rect x="896" y="394" width="240" height="52" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1016" y="417" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BattleCreator</text>
  <text x="1016" y="434" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">Spawn daily battle rounds</text>

  <!-- Arrows: Handlers -> EVM Contracts -->
  <path d="M 896 310 L 860 310 L 860 500 L 790 500" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M 896 352 L 845 352 L 845 540 L 790 540" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M 896 420 L 830 420 L 830 560 L 790 560" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ==================== SECTION: SIDE PANEL — Band Oracle ==================== -->
  <rect x="870" y="520" width="290" height="72" rx="12" fill="#18181b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1015" y="549" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Band Oracle</text>
  <text x="1015" y="569" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11">Price feeds for battle resolution</text>

  <!-- Arrow: Band -> BattlePool -->
  <path d="M 870 570 L 830 570 L 830 580 L 790 580" stroke="#f59e0b" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="870" y="680" width="290" height="80" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="886" y="700" fill="#71717a" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">LEGEND</text>
  <line x1="886" y1="718" x2="916" y2="718" stroke="#22c55e" stroke-width="2"/>
  <text x="924" y="722" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Read path (viem)</text>
  <line x1="1026" y1="718" x2="1056" y2="718" stroke="#3b82f6" stroke-width="2"/>
  <text x="1064" y="722" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Write path (FCL)</text>
  <line x1="886" y1="742" x2="916" y2="742" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="924" y="746" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Oracle feed</text>
  <line x1="1026" y1="742" x2="1056" y2="742" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="1064" y="746" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="11">Internal</text>
</svg>